{% include 'header.html' %}

    <div class="flex flex-wrap items-center justify-between gap-4">
        <div>
            <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Sectores</p>
            <h1 class="mt-2 font-display text-3xl font-semibold text-slate-900">Sectors List</h1>
        </div>
        <a href="{{ url_for('sectores_create') }}" class="inline-flex items-center gap-2 rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-slate-800">
            Add New Sector
        </a>
    </div>

    {% if sectores %}
        <div class="mt-6 overflow-x-auto rounded-xl border border-slate-200 bg-white shadow-sm">
            <table class="min-w-full divide-y divide-slate-200 text-sm">
                <thead class="bg-slate-900 text-left text-xs uppercase tracking-wider text-slate-100">
                    <tr>
                        <th class="px-4 py-3">ID</th>
                        <th class="px-4 py-3">Description</th>
                        <th class="px-4 py-3">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-100">
                    {% for sector in sectores %}
                    <tr class="bg-white">
                        <td class="px-4 py-3 font-semibold text-slate-900">#{{ sector[0] }}</td>
                        <td class="px-4 py-3 text-slate-700">{{ sector[1] }}</td>
                        <td class="px-4 py-3">
                            <div class="flex flex-wrap gap-2">
                                <a href="{{ url_for('sectores_edit', id=sector[0]) }}" class="inline-flex items-center rounded-md bg-amber-100 px-3 py-1.5 text-xs font-semibold text-amber-700 transition hover:bg-amber-200">
                                    Edit
                                </a>
                                <form method="POST" action="{{ url_for('sectores_delete', id=sector[0]) }}" class="inline" onsubmit="return confirm('Are you sure you want to delete this sector?');">
                                    <button type="submit" class="inline-flex items-center rounded-md bg-rose-100 px-3 py-1.5 text-xs font-semibold text-rose-700 transition hover:bg-rose-200">
                                        Delete
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    {% else %}
        <div class="mt-10 rounded-xl border border-dashed border-slate-300 bg-white px-6 py-10 text-center">
            <h2 class="text-lg font-semibold text-slate-800">No sectors found</h2>
            <p class="mt-2 text-sm text-slate-600">Start by <a class="font-semibold text-slate-900 underline decoration-slate-400 underline-offset-4" href="{{ url_for('sectores_create') }}">adding a new sector</a>.</p>
        </div>
    {% endif %}

{% include 'footer.html' %}
